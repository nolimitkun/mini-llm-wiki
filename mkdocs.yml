site_name: Mini Data/AI Platform Wiki
site_description: An agent-maintained knowledge base about data & AI platforms
docs_dir: docs        # staged by scripts/stage-docs.sh from the repo root
site_dir: site

# Fail the build on broken links, but don't fail on pages intentionally
# kept out of the nav (CLAUDE.md, sources/).
validation:
  nav:
    omitted_files: info
  links:
    unrecognized_links: warn

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Light mode

markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences

nav:
  - Home: index.md
  - Fundamentals:
      - What is a data platform?: pages/what-is-a-data-platform.md
      - OLTP vs. OLAP: pages/oltp-vs-olap.md
      - Batch vs. streaming: pages/batch-vs-streaming.md
  - Storage:
      - Data warehouse: pages/data-warehouse.md
      - Data lake: pages/data-lake.md
      - Lakehouse: pages/lakehouse.md
      - Table & file formats: pages/table-and-file-formats.md
  - Ingestion & processing:
      - Data ingestion: pages/data-ingestion.md
      - Data transformation: pages/data-transformation.md
      - Orchestration: pages/orchestration.md
      - Stream processing: pages/stream-processing.md
  - Modeling & serving:
      - Data modeling: pages/data-modeling.md
      - Semantic layer: pages/semantic-layer.md
      - Query engines: pages/query-engines.md
  - Governance & quality:
      - Data governance: pages/data-governance.md
      - Catalog & lineage: pages/data-catalog-and-lineage.md
      - Data quality: pages/data-quality.md
      - Security & privacy: pages/data-security-and-privacy.md
  - ML platform:
      - Overview: pages/ml-platform-overview.md
      - Feature stores: pages/feature-stores.md
      - Model serving: pages/model-serving.md
      - MLOps: pages/mlops.md
  - GenAI platform:
      - LLMs on the platform: pages/llms-on-the-platform.md
      - Embeddings: pages/embeddings.md
      - Vector databases: pages/vector-databases.md
      - RAG: pages/rag.md
      - LLMOps: pages/llmops.md
      - Agents & MCP: pages/agents-and-mcp.md
  - Platform architecture:
      - Reference architecture: pages/reference-architecture.md
      - Data mesh: pages/data-mesh.md
      - Build vs. buy: pages/build-vs-buy.md
      - FinOps: pages/finops.md
  - Glossary: pages/glossary.md
  - Log: log.md
